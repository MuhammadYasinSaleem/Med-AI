<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lab Report Analyzer{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
        }
        
        * {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        .navbar {
            background: rgba(30, 41, 59, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .navbar-brand, .nav-link {
            color: var(--text-primary) !important;
        }
        
        .navbar-brand:hover, .nav-link:hover {
            color: var(--accent-blue) !important;
        }
        
        .main-container {
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin: 2rem auto;
            padding: 2.5rem;
            max-width: 1200px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 15px;
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-hover) 100%);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 15px 15px 0 0 !important;
        }
        
        .card-header.bg-primary {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%) !important;
        }
        
        .card-header.bg-danger {
            background: linear-gradient(135deg, #991b1b 0%, #ef4444 100%) !important;
        }
        
        .card-header.bg-warning {
            background: linear-gradient(135deg, #92400e 0%, #f59e0b 100%) !important;
            color: var(--text-primary) !important;
        }
        
        .card-header.bg-success {
            background: linear-gradient(135deg, #065f46 0%, #10b981 100%) !important;
        }
        
        .card-header.bg-info {
            background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%) !important;
        }
        
        .card-header.bg-secondary {
            background: linear-gradient(135deg, #475569 0%, #64748b 100%) !important;
        }
        
        .critical-alert {
            background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%);
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1rem 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
            }
            50% { 
                box-shadow: 0 8px 35px rgba(239, 68, 68, 0.6);
            }
        }
        
        .abnormal-alert {
            background: rgba(245, 158, 11, 0.15);
            border-left: 4px solid var(--accent-yellow);
            border-radius: 8px;
            padding: 1rem;
            margin: 0.5rem 0;
            color: var(--text-primary);
        }
        
        .normal-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: inline-block;
            margin: 0.25rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending { 
            background: rgba(148, 163, 184, 0.2); 
            color: #cbd5e1; 
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        .status-processing { 
            background: rgba(59, 130, 246, 0.2); 
            color: #93c5fd; 
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .status-completed { 
            background: rgba(16, 185, 129, 0.2); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-failed { 
            background: rgba(239, 68, 68, 0.2); 
            color: #f87171; 
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .btn {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #065f46 0%, #10b981 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #047857 0%, #059669 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-outline-primary {
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            background: transparent;
        }
        
        .btn-outline-primary:hover {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-2px);
        }
        
        .form-control, .form-select {
            background: var(--bg-secondary);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.75rem;
        }
        
        .form-control:focus, .form-select:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        
        .form-label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.4);
            border-radius: 15px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s;
            background: rgba(30, 41, 59, 0.5);
        }
        
        .upload-area:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }
        
        .upload-area.dragover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.2);
        }
        
        .alert {
            border-radius: 12px;
            border: none;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-left: 4px solid #10b981;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-left: 4px solid #ef4444;
        }
        
        .alert-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border-left: 4px solid #f59e0b;
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border-left: 4px solid #3b82f6;
        }
        
        .badge {
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .bg-danger {
            background: linear-gradient(135deg, #991b1b 0%, #ef4444 100%) !important;
        }
        
        .bg-warning {
            background: linear-gradient(135deg, #92400e 0%, #f59e0b 100%) !important;
        }
        
        .bg-success {
            background: linear-gradient(135deg, #065f46 0%, #10b981 100%) !important;
        }
        
        .text-primary {
            color: var(--accent-blue) !important;
        }
        
        .text-info {
            color: #06b6d4 !important;
        }
        
        .text-warning {
            color: var(--accent-yellow) !important;
        }
        
        .text-success {
            color: var(--accent-green) !important;
        }
        
        .text-muted {
            color: var(--text-secondary) !important;
        }
        
        h1, h2, h3, h4, h5, h6 {
            color: var(--text-primary);
        }
        
        strong {
            color: var(--text-primary);
        }
        
        .summary-text {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.3rem;
        }
        
        table {
            color: var(--text-primary);
        }
        
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
        }
        
        .table-striped > tbody > tr:nth-of-type(odd) > td {
            background-color: rgba(59, 130, 246, 0.05);
        }
        
        .form-check-input {
            background-color: var(--bg-secondary);
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .form-check-input:checked {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        .form-check-label {
            color: var(--text-primary);
        }
        
        .list-group-item {
            background: var(--bg-secondary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--text-primary);
        }
        
        .list-group-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }
        
        .list-group-item-action {
            color: var(--text-primary);
        }
        
        .list-group-item-action:hover {
            color: var(--text-primary);
        }
        
        ::placeholder {
            color: var(--text-secondary) !important;
            opacity: 0.6;
        }
        
        ::-webkit-file-upload-button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{% url 'lab_analyzer:home' %}">
                <i class="fas fa-flask"></i> Lab Report Analyzer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: rgba(59, 130, 246, 0.5);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lab_analyzer:home' %}">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">
                            <i class="fas fa-cog"></i> Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1);"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        <div class="main-container">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
